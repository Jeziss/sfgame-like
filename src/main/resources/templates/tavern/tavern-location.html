<!DOCTYPE html>
<html lang="cs" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{tavern}">Tavern</title>
    <link rel="stylesheet" href="/css/app.css" />
</head>

<body>
<div class="container">

    <div class="action-buttons">
        <a th:href="@{/player(target=TAVERN_LOCATIONS)}" th:text="#{backToPlayerList}">Back to Player List</a>
        <a href="/" th:text="#{backToMainMenu}">Back to Main Menu</a>
    </div>

    <div class="page-header">
        <h1 th:text="#{questProgressTitle}">🍺 Complete a quest</h1>
    </div>

    <div th:if="${successMessage}" class="success-message" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="error-message" th:text="${errorMessage}"></div>

    <div class="quest-card" th:if="${quest != null}">
        <h3 th:text="${quest.location}">Quest name</h3>

        <div class="quest-meta">
            <div class="meta-item"><span th:text="#{questDurationLabel}"></span><strong th:text="${quest.energyCost} + ' min'"></strong></div>
            <div class="meta-item"><span th:text="#{xpLabel}"></span><strong th:text="${quest.xpReward}"></strong></div>
            <div class="meta-item"><span th:text="#{goldLabel}"></span><strong th:text="${quest.goldReward}"></strong></div>
            <div class="meta-item"><span th:text="#{energyLabel}"></span><strong th:text="${quest.energyCost}"></strong></div>
        </div>

        <div class="quest-actions">
            <form th:action="@{/tavern/finish-quest}" method="post">
                <input type="hidden" name="playerId" th:value="${player.id}"/>
                <button class="quest-button" type="submit" th:text="#{questCompletedButton}">Completed?</button>
            </form>

            <form th:action="@{/tavern/fail-quest}" method="post">
                <input type="hidden" name="playerId" th:value="${player.id}"/>
                <button class="quest-button" type="submit" th:text="#{questFailedButton}">Failed?</button>
            </form>
        </div>
    </div>

    <div class="quest-empty" th:if="${quest == null}">
        <p th:text="#{noActiveQuestMessage}">You have no active quest.</p>
    </div>
</div>
</body>
</html>
