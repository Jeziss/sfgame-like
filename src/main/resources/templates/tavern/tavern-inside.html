<!DOCTYPE html>
<html lang="cs" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{tavern}">Tavern</title>
    <link rel="stylesheet" href="/css/app.css" />
</head>

<body>
<div class="container">

    <div class="action-buttons">
        <a th:href="@{/player(target=TAVERN)}" th:text="#{backToPlayerList}">Back to Player List</a>
        <a href="/" th:text="#{backToMainMenu}">Back to Main Menu</a>
    </div>

    <div class="page-header">
        <h1 th:text="#{tavernQuestTitle}">🍺 Tavern – choose a quest</h1>
        <h2 class="subheading" th:text="${player.name} + ' (' + #{playerLevelLabel} + ' ' + ${player.level} + ')'">Player name</h2>
        <div class="hero-stat" th:text="${energy} + ' / 100'">100 / 100</div>
    </div>

    <div class="quest-state quest-state-error" th:if="${hasActiveQuest}" th:text="#{activeQuestMessage}"></div>
    <div class="quest-state quest-state-error" th:if="${energy == 0}" th:text="#{noEnergyMessage}"></div>
    <div class="quest-list" th:if="${!hasActiveQuest and energy > 0 and quests != null and !quests.isEmpty()}">
        <div class="quest-card" th:each="quest : ${quests}">
            <h3 th:text="${quest.location}">Quest name</h3>

            <div class="quest-meta">
                <div class="meta-item"><span th:text="#{questLocationLabel}"></span><strong th:text="${quest.location}"></strong></div>
                <div class="meta-item"><span th:text="#{xpLabel}"></span><strong th:text="${quest.xp}"></strong></div>
                <div class="meta-item"><span th:text="#{goldLabel}"></span><strong th:text="${quest.gold}"></strong></div>
                <div class="meta-item"><span th:text="#{energyLabel}"></span><strong th:text="${quest.energy}"></strong></div>
            </div>

            <form th:action="@{/tavern/start-quest}" method="post">
                <input type="hidden" name="questEnergy" th:value="${quest.energy}"/>
                <input type="hidden" name="questLocation" th:value="${quest.location}"/>
                <input type="hidden" name="questXp" th:value="${quest.xp}"/>
                <input type="hidden" name="questGold" th:value="${quest.gold}"/>
                <input type="hidden" name="playerId" th:value="${player.id}"/>
                <button class="quest-button" type="submit"
                        th:disabled="${hasActiveQuest} or ${energy == 0} or ${quest.energy > energy}"
                        th:text="#{startQuestButton}">
                    Start quest
                </button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
